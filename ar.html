<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR GPS Marker (Yaw + Pitch + Roll)</title>
  <link rel="stylesheet" href="ar.css?v=5">
</head>
<body>

  <!-- 🎥 Camera -->
  <video id="camera" autoplay playsinline></video>

  <!-- UI -->
  <div class="ui">
    <button id="startBtn">Start AR</button>
    <button id="toggleInfoBtn">Hide info</button>
    <div class="info" id="infoPanel">
      <p>Version 0.37</p>
      <p>Lat: <span id="lat">-</span></p>
      <p>Lon: <span id="lon">-</span></p>
      <p>Alt: <span id="altitude">-</span></p>

      <hr>

      <p>Yaw: <span id="yaw">-</span>°</p>
      <p>Pitch: <span id="pitch">-</span>°</p>
      <p>Roll: <span id="roll">-</span>°</p>

      <hr>

      <p>Target Bearing: <span id="bearing">-</span>°</p>
      <p>Relative (Yaw diff): <span id="relative">-</span>°</p>
      <p>Distance: <span id="distance">-</span></p>
      <p>Target Alt: <span id="targetAlt">-</span></p>
      <p>Δ Alt: <span id="deltaAlt">-</span></p>
      <p>Δ Pitch: <span id="deltaPitch">-</span></p>

    </div>
  </div>


  <!-- 🎯 AR Marker -->
  <div id="crosshair"></div>
  <div id="horizon"></div>
  <div id="markerWrapper">
    <div id="marker">
      <div class="pin">📍</div>
      <div id="markerLabel">-</div>
    </div>
  </div>

  <!-- ⚙️ FOV SETTINGS POPUP -->
  <div id="settingsPanel" class="hidden">
    <h3>⚙️ FOV Settings</h3>
<div class="fov-row">
  <label>FOV X (↔)</label>
  <input id="fovXInput" type="number" step="1" min="30" max="120">
</div>

<div class="fov-row">
  <label>FOV Y (↕)</label>
  <input id="fovYInput" type="number" step="1" min="30" max="120">
</div>

    <br><br>

    <button id="saveFovBtn">Save</button>
    <button id="closeFovBtn">Close</button>
  </div>

  <!-- ⚙️ Open button -->
  <button id="openFovBtn">⚙️</button>

  <script src="ar.js?v=36"></script>
</body>
</html>
