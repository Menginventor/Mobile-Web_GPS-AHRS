<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile GPS + AHRS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🎥 Camera Background -->
  <video id="camera" autoplay playsinline class="hidden"></video>

  <!-- UI Overlay -->
  <div class="container">

    <h1>📡 GPS + AHRS</h1>

    <button id="startBtn">Start Sensors</button>
    <button id="toggleARBtn">Enable AR</button>

    <div class="card">
      <h2>📍 GPS</h2>
      <p>Latitude: <span id="lat">-</span></p>
      <p>Longitude: <span id="lon">-</span></p>
      <p>Accuracy: <span id="acc">-</span> m</p>
      <p>Altitude: <span id="alt">-</span> m</p>
    </div>

    <div class="card">
      <h2>🧮 Quaternion</h2>
      <p>w: <span id="qw">-</span></p>
      <p>x: <span id="qx">-</span></p>
      <p>y: <span id="qy">-</span></p>
      <p>z: <span id="qz">-</span></p>
    </div>
    <div class="card">
      <h2>➡️ Forward Vector (World)</h2>
      <p>X (East): <span id="fx">-</span></p>
      <p>Y (North): <span id="fy">-</span></p>
      <p>Z (Up): <span id="fz">-</span></p>
    </div>
    <div class="card">
      <h2>🎥 Camera RPY</h2>
      <p>Yaw: <span id="yaw">-</span>°</p>
      <p>Pitch: <span id="pitch">-</span>°</p>
      <p>Roll: <span id="roll">-</span>°</p>
    </div>

    <div class="card">
      <h2>🧭 Camera Heading</h2>
      <h1 id="headingBig">-°</h1>
      <p>Heading: <span id="heading">-</span>°</p>
    </div>

  </div>

  <script src="script.js?v=13"></script>
</body>
</html>
